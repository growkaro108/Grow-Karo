server:
  port: 9090
# HTTP Compression
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
    min-response-size: 2048
spring:
  application:
    name: backend
  # 1. PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:growkaro_db}
    username: ${DB_USERNAME:growkaro}
    password: ${DB_PASSWORD:growkaro123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 1800000

  # 2. Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:} # Leave blank if your container doesn't use a password
      timeout: 60000

  # 3. Cache Configuration (For your @Cacheable annotations)
  cache:
    type: redis
    redis:
      time-to-live: 360000 # Cache expiry in milliseconds (e.g., 10 min)
      cache-null-values: false

  # 4. JPA / Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update   # auto-creates / updates tables from entities
      # ddl-auto: create-drop   
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        
  # 5. Mail Configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: growkaroanand@gmail.com
    password: llqk juwm cupw zyrk
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          # Security Protocols (Forces modern handshakes)
          ssl:
            protocols: TLSv1.2 TLSv1.3
            trust: smtp.gmail.com
          # Timeouts to prevent the connection reset error
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000