server:
  port: ${SERVER_PORT:4000}
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/growkaro_db}
    username: ${SPRING_DATASOURCE_USERNAME:growkaro}
    password: ${SPRING_DATASOURCE_PASSWORD:growkaro123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${SPRING_REDIS_HOST:redis}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 2000ms
  cache:
    type: redis
